<style>
/* ============ TOKENS ============ */
:root{
  --ink:#08090a;
  --panel:#101113;
  --panel-2:#16171a;
  --hairline: rgba(201,162,75,0.16);
  --gold:#c9a24b;
  --gold-bright:#e8c874;
  --gold-dim: rgba(201,162,75,0.55);
  --bronze:#8a6d3b;
  --paper:#f2ede4;
  --paper-dim: rgba(242,237,228,0.62);
  --paper-faint: rgba(242,237,228,0.34);
  --display: 'Fraunces', serif;
  --ui: 'Space Grotesk', sans-serif;
  --body: 'Inter', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --ease: cubic-bezier(.16,.84,.44,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--ink);
  color:var(--paper);
  font-family:var(--body);
  font-weight:300;
  line-height:1.6;
  overflow-x:hidden;
  cursor:none;
}
@media (max-width:900px){ body{cursor:auto;} }
::selection{background:var(--gold); color:var(--ink);}

a{color:inherit; text-decoration:none;}
img{max-width:100%; display:block;}
.wrap{max-width:1180px; margin:0 auto; padding:0 32px;}
section{position:relative; padding:150px 0;}
@media (max-width:768px){ section{padding:96px 0;} .wrap{padding:0 22px;} }

.eyebrow{
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.22em;
  text-transform:uppercase;
  color:var(--gold);
  display:flex; align-items:center; gap:12px;
  margin-bottom:22px;
}
.eyebrow::before{content:""; width:26px; height:1px; background:var(--gold-dim);}

h1,h2,h3{font-family:var(--display); font-weight:500; letter-spacing:-.01em;}
.section-title{
  font-size:clamp(32px,4.4vw,56px);
  line-height:1.06;
  margin-bottom:26px;
  color:var(--paper);
}
.section-title em{font-style:italic; color:var(--gold-bright); font-weight:500;}
.lede{
  font-size:18px;
  color:var(--paper-dim);
  max-width:640px;
  font-weight:300;
}
.hairline{height:1px; background:var(--hairline); border:none; margin:0;}

/* ============ CURSOR ============ */
#cursor-dot,#cursor-ring{
  position:fixed; top:0; left:0; pointer-events:none; z-index:9999;
  border-radius:50%; transform:translate(-50%,-50%);
}
#cursor-dot{width:6px; height:6px; background:var(--gold-bright); }
#cursor-ring{width:34px; height:34px; border:1px solid var(--gold-dim); transition:width .25s var(--ease), height .25s var(--ease), border-color .25s;}
@media (max-width:900px){ #cursor-dot,#cursor-ring{display:none;} }

/* ============ LOADER ============ */
#loader{
  position:fixed; inset:0; background:var(--ink); z-index:10000;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
  transition:opacity .8s var(--ease), visibility .8s;
}
#loader.hide{opacity:0; visibility:hidden;}
.loader-mark{
  width:64px; height:64px; border-radius:50%;
  border:1px solid var(--hairline);
  display:flex; align-items:center; justify-content:center;
  font-family:var(--display); font-style:italic; font-size:26px; color:var(--gold-bright);
  position:relative;
}
.loader-mark::before{
  content:""; position:absolute; inset:-1px; border-radius:50%;
  border:1px solid transparent; border-top-color:var(--gold);
  animation:spin 1.1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loader-text{font-family:var(--mono); font-size:11px; letter-spacing:.3em; color:var(--paper-faint); text-transform:uppercase;}

/* ============ SCROLL PROGRESS ============ */
#progress{position:fixed; top:0; left:0; height:2px; background:linear-gradient(90deg,var(--bronze),var(--gold-bright)); z-index:9998; width:0%;}

/* ============ NAV ============ */
header{
  position:fixed; top:0; left:0; right:0; z-index:900;
  background:rgba(8,9,10,0.55);
  backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--hairline);
}
nav{display:flex; align-items:center; justify-content:space-between; padding:18px 32px; max-width:1180px; margin:0 auto;}
.logo{display:flex; align-items:center; gap:10px; font-family:var(--ui); font-weight:600; letter-spacing:.02em; font-size:18px;}
.logo-mark{width:30px; height:30px; border-radius:8px; background:linear-gradient(145deg,var(--bronze),var(--gold-bright)); display:flex; align-items:center; justify-content:center; font-family:var(--display); font-style:italic; font-size:15px; color:var(--ink);}
.nav-links{display:flex; gap:34px; font-family:var(--ui); font-size:14px; color:var(--paper-dim);}
.nav-links a{position:relative; transition:color .3s;}
.nav-links a:hover{color:var(--gold-bright);}
.nav-links a::after{content:""; position:absolute; left:0; bottom:-6px; width:0; height:1px; background:var(--gold-bright); transition:width .3s var(--ease);}
.nav-links a:hover::after{width:100%;}
.clock{font-family:var(--mono); font-size:12px; color:var(--paper-faint); letter-spacing:.05em;}
.nav-toggle{display:none;}
@media (max-width:900px){
  .nav-links{position:fixed; top:64px; right:0; left:0; background:var(--panel); flex-direction:column; padding:26px 32px; gap:20px; transform:translateY(-130%); transition:transform .4s var(--ease); border-bottom:1px solid var(--hairline);}
  .nav-links.open{transform:translateY(0);}
  .clock{display:none;}
  .nav-toggle{display:block; background:none; border:none; color:var(--paper); font-size:22px; cursor:pointer;}
}

/* ============ HERO ============ */
#hero{
  min-height:100vh; display:flex; align-items:center; position:relative; padding-top:100px;
  overflow:hidden;
}
#hero-canvas{position:absolute; inset:0; z-index:0; opacity:.55;}
.hero-vignette{position:absolute; inset:0; background:radial-gradient(ellipse at 50% 20%, rgba(201,162,75,0.10), transparent 60%), radial-gradient(ellipse at 80% 90%, rgba(138,109,59,0.14), transparent 55%); z-index:0;}
.hero-inner{position:relative; z-index:2; display:grid; grid-template-columns:1.15fr .85fr; gap:60px; align-items:center; width:100%;}
@media (max-width:900px){ .hero-inner{grid-template-columns:1fr; text-align:center; gap:40px;} }
.hero-role{font-family:var(--mono); font-size:12.5px; letter-spacing:.16em; color:var(--paper-dim); text-transform:uppercase; margin-bottom:20px;}
.hero-title{font-size:clamp(38px,6vw,74px); line-height:1.02; margin-bottom:22px;}
.hero-title .line{display:block; overflow:hidden;}
.hero-title em{font-style:italic; color:transparent; -webkit-background-clip:text; background-clip:text; background-image:linear-gradient(100deg,var(--gold),var(--gold-bright),var(--gold));}
.hero-tagline{font-size:19px; color:var(--paper-dim); font-style:italic; font-family:var(--display); max-width:480px; margin-bottom:34px;}
@media (max-width:900px){ .hero-tagline{margin-left:auto; margin-right:auto;} }
.type-cursor{display:inline-block; width:2px; background:var(--gold-bright); margin-left:2px; animation:blink 1s steps(1) infinite;}
@keyframes blink{50%{opacity:0;}}
.hero-ctas{display:flex; gap:16px; flex-wrap:wrap;}
@media (max-width:900px){ .hero-ctas{justify-content:center;} }
.btn{
  font-family:var(--ui); font-size:14px; font-weight:500; padding:15px 30px; border-radius:999px;
  display:inline-flex; align-items:center; gap:8px; transition:all .35s var(--ease); cursor:none;
}
.btn-gold{background:linear-gradient(120deg,var(--bronze),var(--gold-bright)); color:var(--ink); box-shadow:0 0 0 0 rgba(232,200,116,.5);}
.btn-gold:hover{box-shadow:0 0 34px 2px rgba(232,200,116,.35); transform:translateY(-2px);}
.btn-ghost{border:1px solid var(--hairline); color:var(--paper); backdrop-filter:blur(6px);}
.btn-ghost:hover{border-color:var(--gold-dim); color:var(--gold-bright);}

.hero-portrait{position:relative; display:flex; align-items:center; justify-content:center;}
.portrait-ring{
  width:min(340px,72vw); aspect-ratio:1; border-radius:50%;
  background:linear-gradient(155deg, rgba(201,162,75,.55), rgba(138,109,59,.12) 60%);
  padding:3px; position:relative;
  animation:float 7s ease-in-out infinite;
}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-14px);}}
.portrait-inner{
  width:100%; height:100%; border-radius:50%; background:radial-gradient(circle at 35% 30%, #2a2317, #0c0d0e 70%);
  display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden;
  border:1px solid rgba(201,162,75,.25);
}
.portrait-mono{font-family:var(--display); font-style:italic; font-size:96px; color:var(--gold-bright); text-shadow:0 0 40px rgba(232,200,116,.4);}
.portrait-glow{position:absolute; inset:-40%; background:conic-gradient(from 0deg, transparent, rgba(232,200,116,.25), transparent 30%); animation:spin 6s linear infinite;}
.scroll-cue{position:absolute; bottom:34px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; font-family:var(--mono); font-size:10px; letter-spacing:.2em; color:var(--paper-faint); text-transform:uppercase;}
.scroll-cue .stem{width:1px; height:30px; background:linear-gradient(var(--gold-dim),transparent); animation:stem 2s ease-in-out infinite;}
@keyframes stem{0%,100%{transform:scaleY(1); opacity:1;}50%{transform:scaleY(.4); opacity:.4;}}

/* ============ GLASS CARD ============ */
.glass{
  background:linear-gradient(155deg, rgba(255,255,255,.045), rgba(255,255,255,.01));
  border:1px solid var(--hairline);
  border-radius:20px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  transition:transform .4s var(--ease), border-color .4s, box-shadow .4s;
}
.glass:hover{ border-color:var(--gold-dim); box-shadow:0 20px 60px -20px rgba(0,0,0,.6); transform:translateY(-6px); }

/* ============ ABOUT ============ */
#about .grid2{display:grid; grid-template-columns:.9fr 1.1fr; gap:70px; align-items:start;}
@media (max-width:900px){ #about .grid2{grid-template-columns:1fr; gap:40px;} }
.stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:44px;}
@media (max-width:600px){ .stat-row{grid-template-columns:1fr 1fr;} }
.stat{padding:22px 0; border-top:1px solid var(--hairline);}
.stat b{display:block; font-family:var(--ui); font-size:30px; color:var(--gold-bright);}
.stat span{font-size:12px; color:var(--paper-faint); font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase;}
#about p + p{margin-top:16px;}
#about .lede{max-width:none;}

/* ============ FOUNDER ============ */
.founder-card{padding:44px; display:grid; grid-template-columns:1fr auto; gap:30px; align-items:center;}
@media (max-width:700px){ .founder-card{grid-template-columns:1fr;} }
.founder-links{display:flex; gap:14px; flex-wrap:wrap;}
.pill{font-family:var(--mono); font-size:12.5px; padding:11px 18px; border-radius:999px; border:1px solid var(--hairline); display:inline-flex; gap:8px; align-items:center; transition:all .3s;}
.pill:hover{border-color:var(--gold-dim); background:rgba(201,162,75,.08); color:var(--gold-bright);}

/* ============ EDUCATION / LEARNING TAGS ============ */
.tag-cloud{display:flex; flex-wrap:wrap; gap:10px; margin-top:26px;}
.tag{font-family:var(--mono); font-size:12.5px; padding:9px 16px; border:1px solid var(--hairline); border-radius:8px; color:var(--paper-dim); transition:all .3s;}
.tag:hover{border-color:var(--gold-dim); color:var(--gold-bright); transform:translateY(-2px);}

/* ============ SKILLS ============ */
.skill-grid{display:grid; grid-template-columns:1fr 1fr; gap:34px 60px; margin-top:50px;}
@media (max-width:700px){ .skill-grid{grid-template-columns:1fr;} }
.skill-row{}
.skill-head{display:flex; justify-content:space-between; font-family:var(--ui); font-size:14px; margin-bottom:10px;}
.skill-head span:last-child{font-family:var(--mono); color:var(--gold-bright); font-size:12px;}
.skill-track{height:2px; background:var(--hairline); position:relative; overflow:hidden;}
.skill-fill{position:absolute; top:0; left:0; height:100%; width:0%; background:linear-gradient(90deg,var(--bronze),var(--gold-bright)); transition:width 1.4s var(--ease);}

/* ============ TIMELINE ============ */
.timeline{position:relative; margin-top:60px; padding-left:40px;}
.timeline::before{content:""; position:absolute; left:5px; top:6px; bottom:6px; width:1px; background:linear-gradient(var(--gold-dim),transparent);}
.t-item{position:relative; padding-bottom:46px;}
.t-item:last-child{padding-bottom:0;}
.t-item::before{content:""; position:absolute; left:-40px; top:4px; width:11px; height:11px; border-radius:50%; background:var(--ink); border:2px solid var(--gold-dim);}
.t-item.future::before{border-style:dashed; border-color:var(--paper-faint);}
.t-item h4{font-family:var(--ui); font-size:17px; margin-bottom:6px; color:var(--paper);}
.t-item p{color:var(--paper-dim); font-size:14.5px; max-width:520px;}
.t-tag{font-family:var(--mono); font-size:10.5px; text-transform:uppercase; letter-spacing:.14em; color:var(--gold-bright); margin-bottom:8px; display:block;}

/* ============ VISION ============ */
#vision{background:linear-gradient(180deg, transparent, rgba(201,162,75,.045), transparent);}
.vision-quote{font-family:var(--display); font-style:italic; font-size:clamp(24px,3.4vw,40px); line-height:1.35; max-width:820px; color:var(--paper);}
.vision-quote em{color:var(--gold-bright); font-style:italic;}

/* ============ PROJECTS ============ */
.proj-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:26px; margin-top:50px;}
@media (max-width:900px){ .proj-grid{grid-template-columns:1fr 1fr;} }
@media (max-width:600px){ .proj-grid{grid-template-columns:1fr;} }
.proj-card{padding:30px; height:220px; display:flex; flex-direction:column; justify-content:space-between; position:relative; overflow:hidden;}
.proj-num{font-family:var(--mono); font-size:11px; color:var(--gold-dim);}
.proj-card h3{font-family:var(--ui); font-weight:600; font-size:19px; margin:14px 0 8px;}
.proj-card p{font-size:13.5px; color:var(--paper-dim);}
.proj-arrow{position:absolute; right:26px; bottom:26px; font-size:18px; color:var(--gold-dim); transition:transform .35s var(--ease), color .35s;}
.proj-card:hover .proj-arrow{transform:translate(4px,-4px); color:var(--gold-bright);}

/* ============ GITHUB ============ */
.gh-top{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;}
.heatmap{display:grid; grid-template-columns:repeat(26,1fr); gap:3px; margin-top:40px;}
.hcell{aspect-ratio:1; border-radius:2px; background:rgba(201,162,75,.06);}
.repo-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:40px;}
@media (max-width:900px){ .repo-grid{grid-template-columns:1fr 1fr;} }
@media (max-width:600px){ .repo-grid{grid-template-columns:1fr;} }
.repo-card{padding:24px;}
.repo-card h4{font-family:var(--mono); font-size:14.5px; color:var(--gold-bright); margin-bottom:8px;}
.repo-card p{font-size:13px; color:var(--paper-dim); margin-bottom:16px; min-height:36px;}
.repo-meta{display:flex; gap:16px; font-family:var(--mono); font-size:11.5px; color:var(--paper-faint);}

/* ============ BLOG ============ */
.blog-cats{display:flex; flex-wrap:wrap; gap:10px; margin:40px 0 46px;}
.blog-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:24px;}
@media (max-width:900px){ .blog-grid{grid-template-columns:1fr 1fr;} }
@media (max-width:600px){ .blog-grid{grid-template-columns:1fr;} }
.blog-card{overflow:hidden;}
.blog-thumb{height:140px; background:linear-gradient(150deg, var(--panel-2), var(--panel)); position:relative; display:flex; align-items:center; justify-content:center;}
.blog-thumb span{font-family:var(--mono); font-size:11px; letter-spacing:.14em; color:var(--gold-dim); text-transform:uppercase;}
.blog-body{padding:22px;}
.blog-body h4{font-family:var(--ui); font-size:16px; margin-bottom:8px;}
.blog-body p{font-size:13px; color:var(--paper-dim);}
.blog-date{font-family:var(--mono); font-size:11px; color:var(--paper-faint); margin-top:14px; display:block;}

/* ============ GALLERY ============ */
.masonry{columns:3 220px; column-gap:18px; margin-top:44px;}
@media (max-width:700px){ .masonry{columns:2 160px;} }
.m-item{break-inside:avoid; margin-bottom:18px; border-radius:14px; overflow:hidden; position:relative; cursor:none; border:1px solid var(--hairline);}
.m-item .swatch{width:100%; display:block;}
.m-item .m-label{position:absolute; inset:auto 0 0 0; padding:14px; font-family:var(--mono); font-size:11px; color:var(--paper); background:linear-gradient(0deg, rgba(0,0,0,.7), transparent); opacity:0; transition:opacity .3s;}
.m-item:hover .m-label{opacity:1;}
#lightbox{position:fixed; inset:0; background:rgba(6,6,7,.92); backdrop-filter:blur(6px); z-index:9997; display:none; align-items:center; justify-content:center;}
#lightbox.open{display:flex;}
#lightbox .lb-box{width:min(70vw,520px); aspect-ratio:4/5; border-radius:18px;}
#lightbox .lb-close{position:absolute; top:30px; right:40px; font-family:var(--mono); color:var(--paper); font-size:13px; letter-spacing:.1em;}

/* ============ TECH STACK ============ */
.stack-grid{display:grid; grid-template-columns:repeat(6,1fr); gap:18px; margin-top:44px;}
@media (max-width:700px){ .stack-grid{grid-template-columns:repeat(3,1fr);} }
.stack-item{aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;}
.stack-item .glyph{font-family:var(--mono); font-size:18px; color:var(--gold-bright);}
.stack-item span{font-size:10.5px; font-family:var(--ui); color:var(--paper-dim);}

/* ============ VISITOR COUNTER ============ */
.counter-row{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-top:44px;}
@media (max-width:700px){ .counter-row{grid-template-columns:1fr;} }
.counter-card{padding:34px; text-align:center;}
.counter-card b{display:block; font-family:var(--ui); font-size:38px; color:var(--gold-bright); font-variant-numeric:tabular-nums;}
.counter-card span{font-family:var(--mono); font-size:11px; color:v
